version: "3.9"

services:
  db:
    image: postgres:15
    container_name: reservas_db
    restart: always
    environment:
      POSTGRES_DB: db_reservas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: reservas_backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/db_reservas
      DB_USER: postgres
      DB_PASSWORD: 1234

volumes:
  postgres_data: